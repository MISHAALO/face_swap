<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Swap</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f13;
            color: #e4e4e7;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #71717a;
            font-size: 14px;
            margin-bottom: 40px;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 32px;
        }

        @media (max-width: 600px) {
            .upload-grid { grid-template-columns: 1fr; }
        }

        .upload-zone {
            border: 2px dashed #27272a;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #18181b;
            position: relative;
            overflow: hidden;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: #a78bfa;
            background: #1e1b2e;
        }

        .upload-zone.has-file {
            border-color: #22c55e;
            border-style: solid;
        }

        .upload-zone input { display: none; }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .upload-label {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .upload-hint {
            font-size: 12px;
            color: #52525b;
        }

        .preview-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #18181b;
            border-radius: 14px;
        }

        .preview-container img,
        .preview-container video {
            max-width: 100%;
            max-height: 100%;
            border-radius: 14px;
            object-fit: contain;
        }

        .remove-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .remove-btn:hover { background: #ef4444; }

        .swap-btn {
            display: block;
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            color: white;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }

        .swap-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.3);
        }

        .swap-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Progress */
        .progress-section {
            display: none;
            margin-top: 32px;
        }

        .progress-section.active { display: block; }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: #27272a;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #3b82f6);
            border-radius: 4px;
            transition: width 0.3s;
            width: 0%;
        }

        .progress-text {
            text-align: center;
            font-size: 14px;
            color: #a1a1aa;
        }

        /* Result */
        .result-section {
            display: none;
            margin-top: 32px;
            text-align: center;
        }

        .result-section.active { display: block; }

        .result-preview {
            max-width: 100%;
            max-height: 500px;
            border-radius: 16px;
            margin-bottom: 20px;
            background: #18181b;
        }

        .download-btn {
            display: inline-block;
            padding: 14px 32px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #22c55e;
            color: white;
            text-decoration: none;
            transition: all 0.2s;
        }

        .download-btn:hover {
            background: #16a34a;
            transform: translateY(-1px);
        }

        .error-msg {
            display: none;
            margin-top: 20px;
            padding: 16px;
            background: #2d1215;
            border: 1px solid #7f1d1d;
            border-radius: 12px;
            color: #fca5a5;
            font-size: 14px;
            text-align: center;
        }

        .error-msg.active { display: block; }

        .new-btn {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid #3f3f46;
            border-radius: 10px;
            cursor: pointer;
            background: transparent;
            color: #a1a1aa;
            transition: all 0.2s;
        }

        .new-btn:hover {
            border-color: #a78bfa;
            color: #e4e4e7;
        }

        /* Toggle switch */
        .face-only-toggle {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            margin-bottom: 16px;
            user-select: none;
        }

        .face-only-toggle input { display: none; }

        .toggle-track {
            width: 44px;
            height: 24px;
            background: #3f3f46;
            border-radius: 12px;
            position: relative;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .face-only-toggle input:checked + .toggle-track {
            background: #7c3aed;
        }

        .toggle-thumb {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .face-only-toggle input:checked + .toggle-track .toggle-thumb {
            transform: translateX(20px);
        }

        .toggle-label {
            font-size: 14px;
            color: #a1a1aa;
        }

        .face-only-toggle input:checked ~ .toggle-label {
            color: #e4e4e7;
        }

        .warning-msg {
            display: none;
            margin-top: 16px;
            padding: 14px 18px;
            background: #1c1a0e;
            border: 1px solid #854d0e;
            border-radius: 12px;
            color: #fde68a;
            font-size: 13px;
            text-align: left;
            line-height: 1.5;
        }

        .warning-msg.active { display: block; }

        .warning-msg strong {
            display: block;
            margin-bottom: 4px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Face Swap</h1>
        <p class="subtitle">Загрузи GIF или MP4 + фото лица — получишь результат с заменённым лицом</p>

        <div class="upload-grid">
            <!-- Медиа -->
            <div class="upload-zone" id="mediaZone">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="4" width="20" height="16" rx="3"/>
                    <polygon points="10,9 16,12 10,15"/>
                </svg>
                <div class="upload-label">GIF или MP4</div>
                <div class="upload-hint">Перетащи или нажми для выбора</div>
                <input type="file" id="mediaInput" accept=".gif,.mp4,.avi,.mov,.mkv,.webm">
            </div>

            <!-- Лицо -->
            <div class="upload-zone" id="faceZone">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M4 20c0-4 4-7 8-7s8 3 8 7"/>
                </svg>
                <div class="upload-label">Фото лица</div>
                <div class="upload-hint">JPG, PNG — одно чёткое лицо</div>
                <input type="file" id="faceInput" accept=".jpg,.jpeg,.png,.webp,.bmp">
            </div>
        </div>

        <label class="face-only-toggle">
            <input type="checkbox" id="faceOnlyCheck" checked>
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-label">Только лицо (без волос)</span>
        </label>

        <button class="swap-btn" id="swapBtn" disabled>Заменить лицо</button>

        <div class="progress-section" id="progressSection">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Подготовка...</div>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="result-section" id="resultSection">
            <div id="resultContainer"></div>
            <div class="warning-msg" id="warningMsg">
                <strong>⚠️ Не все кадры обработаны</strong>
                <span id="warningText"></span>
            </div>
            <br>
            <a class="download-btn" id="downloadBtn" href="#">Скачать результат</a>
            <br>
            <button class="new-btn" id="newBtn">Новая замена</button>
        </div>
    </div>

    <script>
        const mediaZone = document.getElementById('mediaZone');
        const faceZone = document.getElementById('faceZone');
        const mediaInput = document.getElementById('mediaInput');
        const faceInput = document.getElementById('faceInput');
        const swapBtn = document.getElementById('swapBtn');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const errorMsg = document.getElementById('errorMsg');
        const resultSection = document.getElementById('resultSection');
        const resultContainer = document.getElementById('resultContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        const newBtn = document.getElementById('newBtn');

        let mediaFile = null;
        let faceFile = null;

        // --- Drag & Drop + Click ---
        function setupZone(zone, input, onFile, acceptTypes) {
            zone.addEventListener('click', (e) => {
                if (e.target.classList.contains('remove-btn')) return;
                input.click();
            });

            input.addEventListener('change', () => {
                if (input.files[0]) onFile(input.files[0]);
            });

            zone.addEventListener('dragover', (e) => {
                e.preventDefault();
                zone.classList.add('dragover');
            });

            zone.addEventListener('dragleave', () => {
                zone.classList.remove('dragover');
            });

            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file) onFile(file);
            });
        }

        function showPreview(zone, file, type) {
            // Remove existing preview
            const existing = zone.querySelector('.preview-container');
            if (existing) existing.remove();

            const container = document.createElement('div');
            container.className = 'preview-container';

            const removeBtn = document.createElement('button');
            removeBtn.className = 'remove-btn';
            removeBtn.innerHTML = '×';
            removeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                container.remove();
                zone.classList.remove('has-file');
                if (type === 'media') { mediaFile = null; mediaInput.value = ''; }
                else { faceFile = null; faceInput.value = ''; }
                checkReady();
            });
            container.appendChild(removeBtn);

            const url = URL.createObjectURL(file);

            if (file.type.startsWith('video/') || file.name.endsWith('.mp4') || file.name.endsWith('.webm')) {
                const vid = document.createElement('video');
                vid.src = url;
                vid.autoplay = true;
                vid.loop = true;
                vid.muted = true;
                vid.playsInline = true;
                container.appendChild(vid);
            } else {
                const img = document.createElement('img');
                img.src = url;
                container.appendChild(img);
            }

            zone.appendChild(container);
            zone.classList.add('has-file');
        }

        setupZone(mediaZone, mediaInput, (file) => {
            mediaFile = file;
            showPreview(mediaZone, file, 'media');
            checkReady();
        });

        setupZone(faceZone, faceInput, (file) => {
            faceFile = file;
            showPreview(faceZone, file, 'face');
            checkReady();
        });

        function checkReady() {
            swapBtn.disabled = !(mediaFile && faceFile);
        }

        // --- Swap ---
        swapBtn.addEventListener('click', async () => {
            if (!mediaFile || !faceFile) return;

            swapBtn.disabled = true;
            errorMsg.classList.remove('active');
            resultSection.classList.remove('active');
            progressSection.classList.add('active');
            progressFill.style.width = '0%';
            progressText.textContent = 'Загрузка файлов...';

            const faceOnly = document.getElementById('faceOnlyCheck').checked;
            const formData = new FormData();
            formData.append('media', mediaFile);
            formData.append('face', faceFile);
            formData.append('face_only', faceOnly ? '1' : '0');

            try {
                const res = await fetch('/api/swap', { method: 'POST', body: formData });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Ошибка сервера');
                }
                const { task_id } = await res.json();
                pollProgress(task_id);
            } catch (e) {
                showError(e.message);
                swapBtn.disabled = false;
                progressSection.classList.remove('active');
            }
        });

        async function pollProgress(taskId) {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`/api/status/${taskId}`);
                    const data = await res.json();

                    if (data.total > 0) {
                        const pct = Math.round((data.progress / data.total) * 100);
                        progressFill.style.width = pct + '%';
                        progressText.textContent = `Обработка: ${data.progress} / ${data.total} кадров (${pct}%)`;
                    }

                    if (data.status === 'done') {
                        clearInterval(interval);
                        progressSection.classList.remove('active');
                        showResult(data.result);
                    } else if (data.status === 'error') {
                        clearInterval(interval);
                        progressSection.classList.remove('active');
                        showError(data.error || 'Неизвестная ошибка');
                        swapBtn.disabled = false;
                    }
                } catch (e) {
                    // Retry
                }
            }, 500);
        }

        const warningMsg = document.getElementById('warningMsg');
        const warningText = document.getElementById('warningText');

        function showResult(filename, warnings) {
            resultSection.classList.add('active');
            resultContainer.innerHTML = '';

            const url = `/outputs/${filename}`;
            downloadBtn.href = `/api/download/${filename}`;

            if (filename.endsWith('.gif')) {
                const img = document.createElement('img');
                img.src = url;
                img.className = 'result-preview';
                resultContainer.appendChild(img);
            } else {
                const vid = document.createElement('video');
                vid.src = url;
                vid.className = 'result-preview';
                vid.controls = true;
                vid.autoplay = true;
                vid.loop = true;
                resultContainer.appendChild(vid);
            }

            // Предупреждение о пропущенных кадрах
            if (warnings) {
                warningText.textContent = warnings;
                warningMsg.classList.add('active');
            } else {
                warningMsg.classList.remove('active');
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('active');
        }

        newBtn.addEventListener('click', () => {
            resultSection.classList.remove('active');
            errorMsg.classList.remove('active');
            swapBtn.disabled = false;
        });
    </script>
</body>
</html>
